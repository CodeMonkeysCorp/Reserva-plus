<section class="auth-page">
  <div class="card-soft auth-card">
    <h1 class="auth-title">Entrar no Reserva+</h1>
    <p class="auth-subtitle">Use seu e-mail para acessar reservas e historico.</p>

    <div class="alert alert-danger py-2" *ngIf="errorMessage">{{ errorMessage }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="mb-3">
        <label class="form-label" for="email">E-mail</label>
        <input id="email" type="email" class="form-control" formControlName="email" />
        <div class="text-danger mt-1 small" *ngIf="form.controls.email.touched && form.controls.email.invalid">
          Informe um e-mail valido.
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label" for="senha">Senha</label>
        <input id="senha" type="password" class="form-control" formControlName="senha" />
        <div class="text-danger mt-1 small" *ngIf="form.controls.senha.touched && form.controls.senha.invalid">
          A senha precisa ter ao menos 6 caracteres.
        </div>
      </div>

      <button type="submit" class="btn btn-brand text-white w-100" [disabled]="loading">
        {{ loading ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <div class="auth-footer">
      <span>Nao possui conta?</span>
      <a routerLink="/register">Cadastrar agora</a>
    </div>
  </div>
</section>
