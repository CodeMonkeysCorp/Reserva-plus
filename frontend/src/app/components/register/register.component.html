<section class="auth-page">
  <div class="card-soft auth-card">
    <h1 class="auth-title">Criar conta</h1>
    <p class="auth-subtitle">Cadastre-se para reservar espacos comunitarios.</p>

    <div class="alert alert-danger py-2" *ngIf="errorMessage">{{ errorMessage }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="mb-3">
        <label class="form-label" for="nome">Nome</label>
        <input id="nome" type="text" class="form-control" formControlName="nome" />
      </div>

      <div class="mb-3">
        <label class="form-label" for="email">E-mail</label>
        <input id="email" type="email" class="form-control" formControlName="email" />
      </div>

      <div class="mb-3">
        <label class="form-label" for="senha">Senha</label>
        <input id="senha" type="password" class="form-control" formControlName="senha" />
      </div>

      <div class="mb-3">
        <label class="form-label" for="confirmarSenha">Confirmar senha</label>
        <input id="confirmarSenha" type="password" class="form-control" formControlName="confirmarSenha" />
      </div>

      <button type="submit" class="btn btn-brand text-white w-100" [disabled]="loading">
        {{ loading ? 'Criando conta...' : 'Criar conta' }}
      </button>
    </form>

    <div class="auth-footer">
      <span>Ja possui conta?</span>
      <a routerLink="/login">Entrar</a>
    </div>
  </div>
</section>
