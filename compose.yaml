services:
  mysql:
    image: mysql:8.4
    container_name: reserva-plus-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3310}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-reserva_plus}
      MYSQL_USER: ${MYSQL_USER:-reserva_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-reserva123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_ROOT_HOST: "%"
      TZ: America/Sao_Paulo
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reserva-plus-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-reserva_plus}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USER: ${MYSQL_USER:-reserva_app}
      DB_PASSWORD: ${MYSQL_PASSWORD:-reserva123}
      JWT_SECRET: ${JWT_SECRET:-troque-esta-chave-por-uma-chave-longa}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      APP_ADMIN_NAME: ${APP_ADMIN_NAME:-Administrador}
      APP_ADMIN_EMAIL: ${APP_ADMIN_EMAIL:-admin@reserva.local}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:-admin123}
      RESERVA_CONCLUSAO_CRON: ${RESERVA_CONCLUSAO_CRON:-0 0 * * * *}
      RESERVA_CONCLUSAO_ZONE: ${RESERVA_CONCLUSAO_ZONE:-America/Sao_Paulo}
      APP_STORAGE_R2_ENABLED: ${APP_STORAGE_R2_ENABLED:-false}
      APP_STORAGE_R2_ACCOUNT_ID: ${APP_STORAGE_R2_ACCOUNT_ID:-}
      APP_STORAGE_R2_ENDPOINT: ${APP_STORAGE_R2_ENDPOINT:-}
      APP_STORAGE_R2_BUCKET: ${APP_STORAGE_R2_BUCKET:-}
      APP_STORAGE_R2_ACCESS_KEY_ID: ${APP_STORAGE_R2_ACCESS_KEY_ID:-}
      APP_STORAGE_R2_SECRET_ACCESS_KEY: ${APP_STORAGE_R2_SECRET_ACCESS_KEY:-}
      APP_STORAGE_R2_PUBLIC_BASE_URL: ${APP_STORAGE_R2_PUBLIC_BASE_URL:-}
      APP_STORAGE_R2_OBJECT_KEY_PREFIX: ${APP_STORAGE_R2_OBJECT_KEY_PREFIX:-reserva-plus}
      APP_STORAGE_R2_MAX_FILE_SIZE: ${APP_STORAGE_R2_MAX_FILE_SIZE:-10MB}
    ports:
      - "${BACKEND_PORT:-8180}:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: reserva-plus-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-4300}:80"

volumes:
  mysql_data:
